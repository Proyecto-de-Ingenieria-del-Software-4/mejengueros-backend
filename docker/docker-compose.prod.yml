services:
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
      target: migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
    command: sh -c "yarn prisma migrate deploy"
    networks:
      - backend_network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
      target: runtime
    container_name: nest_app_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      PORT: ${APP_PORT:-3000}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-1209600}
      AUTH_ACTIVE_APP_KEY_ID: ${AUTH_ACTIVE_APP_KEY_ID:?AUTH_ACTIVE_APP_KEY_ID is required}
      AUTH_GOOGLE_ACCEPTED_ISSUERS: ${AUTH_GOOGLE_ACCEPTED_ISSUERS:?AUTH_GOOGLE_ACCEPTED_ISSUERS is required}
      AUTH_GOOGLE_WEB_CLIENT_IDS: ${AUTH_GOOGLE_WEB_CLIENT_IDS:?AUTH_GOOGLE_WEB_CLIENT_IDS is required}
      AUTH_GOOGLE_MOBILE_CLIENT_IDS: ${AUTH_GOOGLE_MOBILE_CLIENT_IDS:?AUTH_GOOGLE_MOBILE_CLIENT_IDS is required}
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend_network

  postgres:
    image: postgres:18
    container_name: postgres_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      TZ: America/Costa_Rica
    expose:
      - "5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

volumes:
  postgres_data_prod:

networks:
  backend_network:
    driver: bridge
